<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>离线 - Parallel Life AI</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0a0e27;
        color: #fff;
        font-family: system-ui, -apple-system, "Noto Sans SC", sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      h1 { font-size: 1.5rem; margin: 0; }
      p { color: #9ca3af; max-width: 28rem; margin: 0; line-height: 1.6; }
      button {
        margin-top: 8px;
        padding: 10px 20px;
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 0.95rem;
        cursor: pointer;
        background: linear-gradient(90deg, #6366f1, #a855f7);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>当前处于离线状态</h1>
      <p>无法连接到网络。生成平行人生需要联网调用 AI，请恢复网络后重试。已生成的记录仍保存在本设备。</p>
      <button onclick="location.reload()">重新加载</button>
    </div>
  </body>
</html>
